<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloudflare Worker KV 最小範例</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>

<body>
  <dialog id="missingBearer">
    <article>
      <input id="bearerTokenInput" type="text" name="text" placeholder="Text" aria-label="Text">
      <footer>
        <button
          class="secondary"
          onclick="localStorage.removeItem('base');location.reload()">Reset</button>
        <button onclick="localStorage.base = bearerTokenInput.value.trim();location.reload()">Confirm</button>
      </footer>
    </article>
  </dialog>

  <main class="container">
    <button onclick="saveToKv(1,2)">Set</button>
  </main>

  <script>
    if (!localStorage.base) {
      document.getElementById("missingBearer").showModal();
    }

    async function saveToKv(key, value) {
      const response = await fetch(`${localStorage.base}/kv`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${localStorage.base}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ key, value }),
      });
      return await response.json();
    }

    async function loadFromKv(key) {
      const response = await fetch(`${localStorage.base}/kv/${encodeURIComponent(key)}`, {
        headers: {
          "Authorization": `Bearer ${localStorage.base}`,
        },
      });
      return await response.json();
    }
  </script>
</body>

</html>
