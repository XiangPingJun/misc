<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.css">
  <script src="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.min.js"></script>
  <script src="./lib.js"></script>
  <style>
    main,
    header {
      padding: 0 !important;
    }
  </style>
</head>

<body style="padding: var(--pico-spacing);">
  <div id="app"></div>

  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10.26.4'
    import { useEffect, useRef, useState } from 'https://esm.sh/preact@10.26.4/hooks'
    import htm from 'https://esm.sh/htm@3.1.1'

    const html = htm.bind(h)
    const MY_NOTES_INIT = "利用聊天技巧依照以下資料幫我產生20種簡單的回應訊息， 你要關心/傾聽/幽默/地獄梗/不傷害對方:\n[他是怎樣的人?][怎麼認識他的?][他以前喜歡什麼?]\n"
    const MODELS = {
      chat: 'xiaomi/mimo-v2-pro',
      imageAnalysis: 'google/gemini-3.1-pro-preview',
      summary: 'xiaomi/mimo-v2-pro',
    }
    const CHAT_FIELDS = {
      myNotes: 'myNotes',
      messages: 'messages',
      messagesRevision: 'messagesRevision',
      summary: 'summary',
      summaryRevision: 'summaryRevision',
    }

    function chatKey(name, field) {
      return `${name}_${field}`
    }

    function modelCacheKey(model) {
      return encodeToVariableName(model || 'default')
    }

    function chatModelKey(name, field, model) {
      return chatKey(name, `${field}_${modelCacheKey(model)}`)
    }

    function parseJson(value, fallback) {
      if (!value) {
        return fallback
      }

      try {
        return JSON.parse(value)
      } catch {
        return fallback
      }
    }

    function formatChatName(meta) {
      const timestamp = Number(meta.time)
      if (!Number.isFinite(timestamp)) {
        return meta.name
      }

      const today = new Date()
      today.setHours(0, 0, 0, 0)

      const chatDate = new Date(timestamp)
      chatDate.setHours(0, 0, 0, 0)

      const dayDiff = Math.round((today.getTime() - chatDate.getTime()) / 86400000)
      return dayDiff > 3 ? `${meta.name}(${dayDiff})` : meta.name
    }

    function sortChatMetas(chatMetas) {
      return [...chatMetas].sort((a, b) => a.time - b.time)
    }

    function formatDateInputValue(timestamp) {
      const date = new Date(Number(timestamp))
      if (!Number.isFinite(date.getTime())) {
        return ''
      }

      const year = date.getFullYear()
      const month = String(date.getMonth() + 1).padStart(2, '0')
      const day = String(date.getDate()).padStart(2, '0')
      return `${year}-${month}-${day}`
    }

    function mergeDateInputWithTimestamp(value, currentTimestamp) {
      if (!value) {
        return Number(currentTimestamp)
      }

      const [year, month, day] = value.split('-').map(Number)
      if (![year, month, day].every(Number.isFinite)) {
        return Number(currentTimestamp)
      }

      const baseDate = new Date(Number(currentTimestamp) || Date.now())
      baseDate.setFullYear(year, month - 1, day)
      return baseDate.getTime()
    }

    function buildUserMessage(prompt, images) {
      const content = []

      if (prompt) {
        content.push({
          type: 'text',
          text: prompt,
        })
      }

      if (Array.isArray(images)) {
        images.forEach(image => {
          if (!image || typeof image.data !== 'string' || typeof image.media_type !== 'string') {
            return
          }

          content.push({
            type: 'image',
            source: {
              type: 'base64',
              media_type: image.media_type,
              data: image.data,
            },
          })
        })
      }

      return {
        role: 'user',
        content,
      }
    }

    function buildAssistantTextMessage(text) {
      return {
        role: 'assistant',
        content: [{ type: 'text', text: text || '' }],
      }
    }

    function buildImageAnalysisPrompt(prompt) {
      return [
        '請使用繁體中文與台灣用語，將圖片內容整理成提供給另一個聊天模型的文字摘要。',
        '如果圖片包含截圖、對話、文件或介面文字，優先完整擷取可見文字。',
        '請嚴格依照以下格式輸出：',
        '圖片重點：',
        '可見文字：',
        '情緒與語氣：',
        '與回覆相關的上下文：',
        '不確定之處：',
        prompt ? `使用者補充：${prompt}` : '',
      ].filter(Boolean).join('\n')
    }

    function buildPromptText(prompt, imageSummary) {
      const sections = []

      if (prompt) {
        sections.push(prompt)
      }

      if (imageSummary) {
        sections.push(['圖片描述：', imageSummary].join('\n'))
      }

      return sections.join('\n\n')
    }

    function normalizeMessageBlock(block, role) {
      if (!block || typeof block !== 'object') {
        return null
      }

      if (block.type === 'text') {
        const text = typeof block.text === 'string'
          ? block.text
          : typeof block.text?.text === 'string'
            ? block.text.text
            : ''

        if (!text) {
          return null
        }

        return {
          type: 'text',
          text,
        }
      }

      return null
    }

    function normalizeMessages(messages) {
      if (!Array.isArray(messages)) {
        return []
      }

      return messages.map(message => {
        if (!message || (message.role !== 'user' && message.role !== 'assistant')) {
          return null
        }

        const content = Array.isArray(message.content)
          ? message.content.map(block => normalizeMessageBlock(block, message.role)).filter(Boolean)
          : []

        if (!content.length) {
          return null
        }

        return {
          role: message.role,
          content,
        }
      }).filter(Boolean)
    }

    function extractMessageText(message) {
      if (!Array.isArray(message?.content)) {
        return ''
      }

      return message.content
        .filter(block => block?.type === 'text' && typeof block.text === 'string')
        .map(block => block.text)
        .join('\n')
    }

    function formatChatMessagesForSummary(messages) {
      return messages.map(message => {
        const text = extractMessageText(message)
        return text ? `${message.role}:\n${text}` : ''
      }).filter(Boolean).join('\n\n')
    }

    function latestExchangeText(messages) {
      return messages.slice(-2).map(message => {
        const text = extractMessageText(message)
        return text ? `${message.role}: ${text}` : ''
      }).filter(Boolean).join('\n')
    }

    async function fileToBase64(file) {
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader()
        reader.onload = () => resolve(reader.result)
        reader.onerror = () => reject(reader.error)
        reader.readAsDataURL(file)
      })

      const [meta, base64] = dataUrl.split(',')
      const mediaType = meta.match(/data:(.*);base64/)[1]
      return { media_type: mediaType, data: base64 }
    }

    async function saveToKv(key, value) {
      NProgress.start()
      try {
        const response = await fetch(`${localStorage.url}/kv`, {
          method: 'POST',
          headers: {
            Authorization: `Bearer ${localStorage.bearer}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ key, value }),
        })
        return await response.json()
      } finally {
        NProgress.done()
      }
    }

    async function loadFromKv(key) {
      NProgress.start()
      try {
        const response = await fetch(`${localStorage.url}/kv/${encodeURIComponent(key)}`, {
          headers: {
            Authorization: `Bearer ${localStorage.bearer}`,
          },
        })

        if (response.status === 404) {
          await saveToKv(key, '')
          return ''
        }

        return (await response.json()).value
      } finally {
        NProgress.done()
      }
    }

    async function deleteFromKv(key) {
      NProgress.start()
      try {
        const response = await fetch(`${localStorage.url}/kv/${encodeURIComponent(key)}`, {
          method: 'DELETE',
          headers: {
            Authorization: `Bearer ${localStorage.bearer}`,
          },
        })
        return await response.json()
      } finally {
        NProgress.done()
      }
    }

    async function callOpenRouterApi({ messages, prompt, system, chatName, model, images }) {
      NProgress.start()
      try {
        const response = await fetch(`${localStorage.url}/openrouter`, {
          method: 'POST',
          headers: {
            Authorization: `Bearer ${localStorage.bearer}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ messages, prompt, system, chat_name: chatName, model, images }),
        })
        return await response.json()
      } finally {
        NProgress.done()
      }
    }

    async function loadChatMetas() {
      return parseJson(await loadFromKv('chatMetas'), [])
    }

    async function saveChatMetas(chatMetas) {
      await saveToKv('chatMetas', JSON.stringify(chatMetas))
    }

    async function loadChatMessages(name) {
      return normalizeMessages(parseJson(await loadFromKv(chatKey(name, CHAT_FIELDS.messages)), []))
    }

    async function saveChatMessages(name, messages) {
      await saveToKv(chatKey(name, CHAT_FIELDS.messages), JSON.stringify(normalizeMessages(messages)))
    }

    async function loadNumberFromKv(key, fallback) {
      const value = Number(await loadFromKv(key))
      return Number.isFinite(value) ? value : fallback
    }

    async function loadChatRevision(name) {
      return loadNumberFromKv(chatKey(name, CHAT_FIELDS.messagesRevision), 0)
    }

    async function saveChatRevision(name, revision) {
      await saveToKv(chatKey(name, CHAT_FIELDS.messagesRevision), String(revision))
    }

    async function loadSummaryRevision(name, model) {
      return loadNumberFromKv(chatModelKey(name, CHAT_FIELDS.summaryRevision, model), -1)
    }

    async function saveSummary(name, model, summary, revision) {
      await Promise.all([
        saveToKv(chatModelKey(name, CHAT_FIELDS.summary, model), summary),
        saveToKv(chatModelKey(name, CHAT_FIELDS.summaryRevision, model), String(revision)),
      ])
    }

    async function analyzePromptImages(prompt, images) {
      if (!images.length) {
        return ''
      }

      const analysisMessage = buildUserMessage(buildImageAnalysisPrompt(prompt), images)
      const analysisResult = await callOpenRouterApi({
        messages: [analysisMessage],
        model: MODELS.imageAnalysis,
      })

      return analysisResult.content || ''
    }

    async function summarizeChatMessages(name, messages, myNotes) {
      if (!messages.length) {
        await saveSummary(name, MODELS.summary, '', await loadChatRevision(name))
        return ''
      }

      const revision = await loadChatRevision(name)
      const summaryResult = await callOpenRouterApi({
        prompt: [
          '請用繁體中文精簡整理以下對話重點。去除重複，輸出精簡條列摘要。',
          '',
          '我的筆記：',
          myNotes || '目前沒有 myNotes。',
          '',
          '對話訊息：',
          formatChatMessagesForSummary(messages),
        ].join('\n'),
        model: MODELS.summary,
      })

      const summary = summaryResult.content || ''
      await saveSummary(name, MODELS.summary, summary, revision)
      return summary
    }

    async function ensureChatSummary(name, messages, myNotes) {
      const [messageRevision, summaryRevision, storedSummary] = await Promise.all([
        loadChatRevision(name),
        loadSummaryRevision(name, MODELS.summary),
        loadFromKv(chatModelKey(name, CHAT_FIELDS.summary, MODELS.summary)),
      ])

      if (summaryRevision === messageRevision && (storedSummary || !messages.length)) {
        return storedSummary || ''
      }

      return summarizeChatMessages(name, messages, myNotes)
    }

    async function refreshChatMetaTime(name) {
      const chatMetas = await loadChatMetas()
      const meta = chatMetas.find(item => item.name === name)
      if (!meta) {
        return sortChatMetas(chatMetas)
      }

      meta.time = Date.now()
      await saveChatMetas(chatMetas)
      return sortChatMetas(chatMetas)
    }

    function App() {
      const [isReady, setIsReady] = useState(false)
      const [requiresCredentials, setRequiresCredentials] = useState(false)
      const [isDateDialogOpen, setIsDateDialogOpen] = useState(false)
      const [urlInput, setUrlInput] = useState(localStorage.url || '')
      const [bearerInput, setBearerInput] = useState(localStorage.bearer || '')
      const [aboutMe, setAboutMe] = useState('')
      const [chatMetas, setChatMetasState] = useState([])
      const [activeChatName, setActiveChatName] = useState('')
      const [activeFeature, setActiveFeature] = useState('')
      const [chatMessages, setChatMessages] = useState([])
      const [myNotes, setMyNotes] = useState('')
      const [summaryText, setSummaryText] = useState('')
      const [promptTextValue, setPromptTextValue] = useState('')
      const [promptImages, setPromptImages] = useState([])
      const [promptResult, setPromptResult] = useState('')
      const promptTextareaRef = useRef(null)
      const myNotesTextareaRef = useRef(null)

      useEffect(() => {
        void init()
      }, [])

      useEffect(() => {
        if (!activeChatName) {
          return
        }

        if (activeFeature === 'myNotes') {
          myNotesTextareaRef.current?.focus()
          return
        }

        if (activeFeature === 'chat') {
          promptTextareaRef.current?.focus()
        }
      }, [activeFeature, activeChatName])

      useEffect(() => {
        if (activeFeature !== 'aiNotes' || !activeChatName) {
          return
        }

        void (async () => {
          const summary = await ensureChatSummary(activeChatName, chatMessages, myNotes)
          setSummaryText(summary)
        })()
      }, [activeFeature, activeChatName, chatMessages, myNotes])

      async function init() {
        if (!localStorage.url || !localStorage.bearer || location.search === '?reset') {
          setRequiresCredentials(true)
          setIsReady(true)
          return
        }

        const [loadedAboutMe, loadedChatMetas] = await Promise.all([
          loadFromKv('ABOUT_ME'),
          loadChatMetas(),
        ])

        const sortedChatMetas = sortChatMetas(loadedChatMetas)
        setAboutMe(loadedAboutMe)
        setChatMetasState(sortedChatMetas)

        if (localStorage.defaultName && sortedChatMetas.some(meta => meta.name === localStorage.defaultName)) {
          const defaultName = localStorage.defaultName
          localStorage.removeItem('defaultName')
          await openChat(defaultName)
        }

        setIsReady(true)
      }

      async function openChat(name) {
        const [loadedMyNotes, loadedMessages] = await Promise.all([
          loadFromKv(chatKey(name, CHAT_FIELDS.myNotes)),
          loadChatMessages(name),
        ])

        setActiveChatName(name)
        setMyNotes(loadedMyNotes)
        setChatMessages(loadedMessages)
        setSummaryText('')
        setPromptResult(latestExchangeText(loadedMessages))
        setPromptTextValue('')
        setPromptImages([])
        setActiveFeature(loadedMyNotes === MY_NOTES_INIT ? 'myNotes' : 'chat')
      }

      async function persistCurrentMyNotes() {
        if (!activeChatName) {
          return
        }

        await saveToKv(chatKey(activeChatName, CHAT_FIELDS.myNotes), myNotes)
      }

      async function activateFeature(nextFeature, persist = true) {
        if (!activeChatName) {
          return
        }

        if (persist && activeFeature === 'myNotes' && nextFeature !== 'myNotes') {
          await persistCurrentMyNotes()
        }

        setActiveFeature(nextFeature)
      }

      function resetActiveChatView() {
        setActiveChatName('')
        setActiveFeature('')
        setChatMessages([])
        setMyNotes('')
        setSummaryText('')
        setPromptTextValue('')
        setPromptImages([])
        setPromptResult('')
      }

      async function back() {
        if (activeChatName) {
          await persistCurrentMyNotes()
        }

        resetActiveChatView()
      }

      async function add() {
        const input = prompt()
        if (!input) {
          return
        }

        const name = encodeToVariableName(input)
        const nextChatMetas = sortChatMetas([
          ...chatMetas,
          { name, time: Date.now() },
        ])

        await saveChatMetas(nextChatMetas)
        await Promise.all([
          saveToKv(chatKey(name, CHAT_FIELDS.myNotes), MY_NOTES_INIT),
          saveToKv(chatKey(name, CHAT_FIELDS.messages), '[]'),
          saveToKv(chatKey(name, CHAT_FIELDS.messagesRevision), '0'),
          saveToKv(chatKey(name, CHAT_FIELDS.summary), ''),
          saveToKv(chatKey(name, CHAT_FIELDS.summaryRevision), '-1'),
        ])

        setChatMetasState(nextChatMetas)
        await openChat(name)
      }

      async function remove() {
        const input = prompt()
        if (!input) {
          return
        }

        const normalizedInput = input.trim()
        const encodedInput = encodeToVariableName(normalizedInput)
        const targetMeta = chatMetas.find(meta => {
          return meta.name === normalizedInput || meta.name === encodedInput
        })

        if (!targetMeta) {
          alert('找不到指定的聊天')
          return
        }

        const targetName = targetMeta.name
        const remainingChatMetas = chatMetas.filter(meta => meta.name !== targetName)
        const keysToDelete = [
          chatKey(targetName, CHAT_FIELDS.myNotes),
          chatKey(targetName, CHAT_FIELDS.messages),
          chatKey(targetName, CHAT_FIELDS.messagesRevision),
          chatKey(targetName, CHAT_FIELDS.summary),
          chatKey(targetName, CHAT_FIELDS.summaryRevision),
          chatModelKey(targetName, CHAT_FIELDS.summary, MODELS.summary),
          chatModelKey(targetName, CHAT_FIELDS.summaryRevision, MODELS.summary),
        ]

        await Promise.all([
          saveChatMetas(remainingChatMetas),
          ...keysToDelete.map(key => deleteFromKv(key)),
        ])

        setChatMetasState(sortChatMetas(remainingChatMetas))

        if (activeChatName === targetName) {
          resetActiveChatView()
        }
      }

      async function updateActiveChatTime(value) {
        if (!activeChatName) {
          return
        }

        const currentMeta = chatMetas.find(meta => meta.name === activeChatName)
        if (!currentMeta) {
          return
        }

        const nextTime = mergeDateInputWithTimestamp(value, currentMeta.time)
        const nextChatMetas = sortChatMetas(chatMetas.map(meta => {
          if (meta.name !== activeChatName) {
            return meta
          }

          return {
            ...meta,
            time: nextTime,
          }
        }))

        await saveChatMetas(nextChatMetas)
        setChatMetasState(nextChatMetas)
        setIsDateDialogOpen(false)
      }

      function showDateDialog() {
        if (!activeChatName) {
          return
        }

        setIsDateDialogOpen(true)
      }

      function hideDateDialog() {
        setIsDateDialogOpen(false)
      }

      function closeDropdown(event) {
        event.preventDefault()
        const details = event.currentTarget.closest('details')
        if (details) {
          details.open = false
        }
      }

      function onFeatureMenuClick(event, action) {
        closeDropdown(event)
        void action()
      }

      async function onPromptPaste(event) {
        const items = Array.from(event.clipboardData?.items || [])
        const imageItems = items.filter(item => item.type.startsWith('image/'))

        if (!imageItems.length) {
          return
        }

        event.preventDefault()
        const nextImages = []

        for (const item of imageItems) {
          const file = item.getAsFile()
          if (!file) {
            continue
          }

          nextImages.push(await fileToBase64(file))
        }

        setPromptImages(currentImages => [...currentImages, ...nextImages])
      }

      async function sendPrompt() {
        const prompt = promptTextValue.trim()
        if (!prompt && !promptImages.length) {
          return
        }

        const imageSummary = await analyzePromptImages(prompt, promptImages)
        const promptText = buildPromptText(prompt, imageSummary)
        const userMessage = buildUserMessage(promptText, [])

        if (!userMessage.content.length) {
          return
        }

        const requestMessages = [
          ...chatMessages,
          userMessage,
        ]

        const modelResult = await callOpenRouterApi({
          messages: requestMessages,
          system: [
            '所有對話必須使用台灣用語',
            '關於我：',
            aboutMe || '目前沒有關於我。',
            '',
            '我的筆記：',
            myNotes || '目前沒有 myNotes。',
          ].join('\n'),
          chatName: activeChatName,
          model: MODELS.chat,
        })

        if (modelResult.error) {
          setPromptResult(modelResult.error)
          return
        }

        const assistantMessage = buildAssistantTextMessage(modelResult.content || '')
        const updatedMessages = [
          ...requestMessages,
          assistantMessage,
        ]

        await saveChatMessages(activeChatName, updatedMessages)
        await saveChatRevision(activeChatName, (await loadChatRevision(activeChatName)) + 1)
        setChatMessages(updatedMessages)
        setPromptResult(modelResult.content || '')
        setPromptTextValue('')
        setPromptImages([])
        setChatMetasState(await refreshChatMetaTime(activeChatName))
      }

      function setCredentials() {
        localStorage.url = urlInput.trim()
        localStorage.bearer = bearerInput.trim().replace(/\/$/, '')
        const currentUrl = new URL(location.href)
        currentUrl.search = ''
        location.replace(currentUrl.toString())
      }

      if (!isReady) {
        return html`<main class="container"><article>Loading...</article></main>`
      }

      if (requiresCredentials) {
        return html`
          <main class="container">
            <input value=${urlInput} onInput=${event => setUrlInput(event.currentTarget.value)} type="text" placeholder="URL" />
            <input value=${bearerInput} onInput=${event => setBearerInput(event.currentTarget.value)} type="text" placeholder="Bearer" />
            <button onClick=${setCredentials}>Confirm</button>
          </main>
        `
      }

      const featureLabel = (() => {
        switch (activeFeature) {
          case 'myNotes': return '📝前言'
          case 'aiNotes': return '📌總結'
          case 'chat': return '💬聊天'
          default: return ''
        }
      })()
      const activeChatMeta = chatMetas.find(meta => meta.name === activeChatName)
      const activeChatDateValue = formatDateInputValue(activeChatMeta?.time)

      const renderPromptImages = () => html`
        <div>
          ${promptImages.map((image, index) => html`
            <article key=${`${image.media_type}-${index}`} style=${{ display: 'inline-block', marginRight: 'var(--pico-spacing)', marginBottom: 'var(--pico-spacing)' }}>
              <img
                src=${`data:${image.media_type};base64,${image.data}`}
                alt=${`pasted-image-${index + 1}`}
                style=${{ maxWidth: '160px', maxHeight: '160px', display: 'block', marginBottom: '0.5rem' }}
              />
            </article>
          `)}
        </div>
      `

      const renderDateDialog = () => html`
        <dialog open onClose=${hideDateDialog}>
          <article>
            <header style=${{ padding: 'var(--pico-spacing) !important' }}>
              <button aria-label="Close" rel="prev" onClick=${hideDateDialog}></button>
            </header>
            <input
              type="date"
              aria-label="Date"
              value=${activeChatDateValue}
              onChange=${event => void updateActiveChatTime(event.currentTarget.value)}
            />
          </article>
        </dialog>
      `

      return html`
        <div>
          ${isDateDialogOpen && renderDateDialog()}
        ${activeChatName && html`
            <header style=${{ display: 'block' }}>
              <div style=${{ display: 'flex', alignItems: 'center', gap: 'calc(var(--pico-spacing) / 2)', marginBottom: 'var(--pico-spacing)' }}>
                <div style=${{ margin: 0 }}>${activeChatName}</div>
                <details class="dropdown" style=${{ margin: 0 }}>
                  <summary role="button" class="outline">${featureLabel}</summary>
                  <ul>
                    <li><a href="#" onClick=${event => onFeatureMenuClick(event, () => activateFeature('myNotes'))}>📝前言</a></li>
                    <li><a href="#" onClick=${event => onFeatureMenuClick(event, () => activateFeature('aiNotes'))}>📌總結</a></li>
                    <li><a href="#" onClick=${event => onFeatureMenuClick(event, () => activateFeature('chat'))}>💬聊天</a></li>
                    <li><a href="#" onClick=${event => onFeatureMenuClick(event, async () => showDateDialog())}>📅日期</a></li>
                    <li><a href="#" onClick=${event => onFeatureMenuClick(event, () => back())}>↩️返回</a></li>
                  </ul>
                </details>
                <button onClick=${sendPrompt} disabled=${activeFeature !== 'chat'}>送出</button>
              </div>
            </header>
          `}

          ${!activeChatName && html`
            <main>
              ${chatMetas.map(meta => html`
                <button key=${meta.name} onClick=${() => void openChat(meta.name)}>${formatChatName(meta)}</button>
              `)}
              <button class="outline" onClick=${add}>＋</button>
              <button class="outline" onClick=${remove}>－</button>
            </main>
          `}

          ${activeChatName && activeFeature === 'myNotes' && html`
            <main>
              <textarea ref=${myNotesTextareaRef} rows="12" value=${myNotes} onInput=${event => setMyNotes(event.currentTarget.value)} />
            </main>
          `}

          ${activeChatName && activeFeature === 'aiNotes' && html`
            <main>
              <article style=${{ whiteSpace: 'pre-line' }}>${summaryText}</article>
            </main>
          `}

          ${activeChatName && activeFeature === 'chat' && html`
            <main>
              <textarea
                ref=${promptTextareaRef}
                rows="4"
                value=${promptTextValue}
                onInput=${event => setPromptTextValue(event.currentTarget.value)}
                onPaste=${onPromptPaste}
              />
              ${renderPromptImages()}
              <article style=${{ whiteSpace: 'pre-line' }}>${promptResult}</article>
            </main>
          `}
        </div>
      `
    }

    render(html`<${App} />`, document.getElementById('app'))
  </script>
</body>

</html>
