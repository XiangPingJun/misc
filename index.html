<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.css">
  <script src="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.min.js"></script>
  <script src="./lib.js"></script>
  <style>
    main,
    header {
      padding: 0 !important;
      display: none;
    }

    fieldset label {
      display: inline;
      user-select: none;
      margin-right: var(--pico-spacing);
    }
  </style>
</head>

<body style="padding: var(--pico-spacing);">
  <header>
    <div role="group">
      <button onclick="sendPrompt()">↑<span id="activeName"></span></button>
      <button name="featureRadio" id="myNotesRadio" onclick="onFeatureSel(event)">✏️</button>
      <button name="featureRadio" id="aiNotesRadio" onclick="onFeatureSel(event)">🤖</button>
      <button name="featureRadio" id="promptRadio" onclick="onFeatureSel(event)">💬</button>
    </div>
  </header>

  <main id="credentials" class="container">
    <input id="urlInput" type="text" placeholder="URL">
    <input id="bearerInput" type="text" placeholder="Bearer">
    <button onclick="setCredentials()">Confirm</button>
  </main>

  <main id="chatNames">
    <template id="chatNameTemplate">
      <button></button>
    </template>
    <button onclick="add()">＋</button>
  </main>

  <main id="myNotes">
    <textarea rows="12"></textarea>
  </main>

  <main id="aiNotes">
    <article style="white-space: pre-line;"></article>
  </main>

  <main id="prompt">
    <textarea rows="4"></textarea>
    <div id="promptImages"></div>
    <article style="white-space: pre-line;"></article>
  </main>

  <script>
    const MY_NOTES_INIT = "利用聊天技巧依照以下資料幫我產生三種簡單的回應訊息 關心對方 傾聽對方 別說會傷害對方的言詞:\n[他是怎樣的人?][怎麼認識他的?][他以前喜歡什麼?]\n\n"
    const HAIKU_MODEL = "claude-haiku-4-5"
    const promptImages = []
    let aboutMe

    function sel(selector) {
      return document.querySelector(selector)
    }

    function selAll(selector) {
      return document.querySelectorAll(selector)
    }

    function formatChatName(meta) {
      const timestamp = Number(meta.time)
      if (!Number.isFinite(timestamp)) {
        return meta.name
      }

      const today = new Date()
      today.setHours(0, 0, 0, 0)

      const chatDate = new Date(timestamp)
      chatDate.setHours(0, 0, 0, 0)

      const dayDiff = Math.round((today.getTime() - chatDate.getTime()) / 86400000)
      return `${meta.name}-${dayDiff}`
    }

    function renderPromptImages() {
      const container = sel("#promptImages")
      container.innerHTML = ""

      promptImages.forEach((image, index) => {
        const wrapper = document.createElement("article")
        wrapper.style.display = "inline-block"
        wrapper.style.marginRight = "var(--pico-spacing)"
        wrapper.style.marginBottom = "var(--pico-spacing)"

        const preview = document.createElement("img")
        preview.src = `data:${image.media_type};base64,${image.data}`
        preview.alt = `pasted-image-${index + 1}`
        preview.style.maxWidth = "160px"
        preview.style.maxHeight = "160px"
        preview.style.display = "block"
        preview.style.marginBottom = "0.5rem"

        wrapper.appendChild(preview)
        container.appendChild(wrapper)
      })
    }

    async function fileToBase64(file) {
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader()
        reader.onload = () => resolve(reader.result)
        reader.onerror = () => reject(reader.error)
        reader.readAsDataURL(file)
      })

      const [meta, base64] = dataUrl.split(",")
      const mediaType = meta.match(/data:(.*);base64/)[1]
      return { media_type: mediaType, data: base64 }
    }

    async function onPromptPaste(event) {
      const items = Array.from(event.clipboardData?.items || [])
      const imageItems = items.filter(item => item.type.startsWith("image/"))

      if (!imageItems.length) {
        return
      }

      event.preventDefault()

      for (const item of imageItems) {
        const file = item.getAsFile()
        if (!file) {
          continue
        }

        promptImages.push(await fileToBase64(file))
      }

      renderPromptImages()
    }

    async function add() {
      const input = prompt()
      if (!input) {
        return
      }
      selAll('main').forEach(m => m.style.display = "none")
      const name = encodeToVariableName(input)
      const chatMetas = JSON.parse(await loadFromKv("chatMetas"))
      chatMetas.push({ name, time: new Date().getTime() })
      await saveToKv("chatMetas", JSON.stringify(chatMetas))
      await saveToKv(`${name}_myNotes`, MY_NOTES_INIT)
      await saveToKv(`${name}_aiNotes`, '')
      localStorage.defaultName = name
      location.reload()
    }

    async function refreshChatMetaTime(name) {
      const chatMetas = JSON.parse(await loadFromKv("chatMetas"))
      const meta = chatMetas.find(item => item.name === name)
      meta.time = new Date().getTime()
      await saveToKv("chatMetas", JSON.stringify(chatMetas))
    }

    async function init() {
      if (!localStorage.url || !localStorage.bearer || location.search === "?reset") {
        sel('header').style.display = "none"
        sel("#credentials").style.display = "block"
        return
      }

      aboutMe = await loadFromKv("ABOUT_ME")
      const chatMetas = JSON.parse(await loadFromKv("chatMetas"))

      chatMetas.sort((a, b) => a.time - b.time).forEach(meta => {
        const clone = sel("#chatNameTemplate").content.cloneNode(true)
        const btn = clone.querySelector('button')
        btn.dataset.chatName = meta.name
        btn.textContent = formatChatName(meta)
        btn.onclick = async () => {
          activeName.textContent = meta.name

          let key = `${meta.name}_myNotes`

          sel('header').style.display = "block"
          selAll('main').forEach(m => m.style.display = "none")

          const myNotesTextarea = sel("#myNotes textarea")
          myNotesTextarea.value = await loadFromKv(key)
          sel(myNotesTextarea.value === MY_NOTES_INIT ? '#myNotesRadio' : '#promptRadio').click()

          key = `${meta.name}_aiNotes`
          sel("#aiNotes article").textContent = await loadFromKv(key)
        }
        if (meta.name === localStorage.defaultName) {
          btn.click()
          localStorage.removeItem("defaultName")
        }
        sel("#chatNames").appendChild(clone)
      })
      sel("#chatNames").style.display = "block"
    }
    init()

    sel("#prompt textarea").addEventListener("paste", onPromptPaste)
    renderPromptImages()

    async function sendPrompt() {
      const textarea = sel("#prompt textarea")
      const value = textarea.value.trim()
      if (!value && !promptImages.length) {
        return
      }

      const name = activeName.textContent
      const myNotesKey = `${name}_myNotes`
      const myNotesResult = await loadFromKv(myNotesKey)
      const currentAiNotes = sel("#aiNotes article").textContent
      const claudeResult = await callClaudeApi(
        value, `關於我:${aboutMe}\n\n` + myNotesResult + currentAiNotes, name, 'claude-opus-4-6', promptImages,
      )
      const aiContent = claudeResult.content

      sel("#prompt article").textContent = aiContent

      const mergeResult = await callClaudeApi(
        [
          `請用繁體中文統整「${name}」的重點。`,
          '請把「新回應」與「既有歷史重點」合併成一份精簡、可持續更新的摘要。',
          '請去除重複，保留人物特徵、互動脈絡、重要事件、偏好與注意事項。',
          '',
          '既有歷史重點：',
          currentAiNotes || '目前沒有既有摘要。',
          '',
          '新回應：',
          aiContent,
        ].join('\n'),
        myNotesResult,
        name,
        HAIKU_MODEL,
      )

      const mergedAiNotes = mergeResult.content || currentAiNotes || aiContent
      sel("#aiNotes article").textContent = mergedAiNotes
      await saveToKv(`${name}_aiNotes`, mergedAiNotes)

      promptImages.length = 0
      renderPromptImages()
      textarea.value = ''
      await refreshChatMetaTime(name)
    }

    function onFeatureSel(event) {
      selAll("[name=featureRadio]").forEach(btn => btn.classList.add("outline"))
      event.target.classList.remove("outline")
      const id = event.target.id.replace('Radio', '')
      selAll('main').forEach(m => m.style.display = "none")
      sel(`#${id}`).style.display = "block"

      const btn = sel("header button")
      btn.disabled = true
      if (id === "myNotes") {
        sel("#myNotes textarea").focus()
      } else {
        saveToKv(`${activeName.textContent}_myNotes`, sel("#myNotes textarea").value)
      }
      if (id === "prompt") {
        btn.disabled = false
        const textarea = sel("#prompt textarea")
        textarea.focus()
      }
    }

    async function setCredentials() {
      localStorage.url = urlInput.value.trim()
      localStorage.bearer = bearerInput.value.trim().replace(/\/$/, '')
      const currentUrl = new URL(location.href)
      currentUrl.search = ''
      location.replace(currentUrl.toString())
    }

    async function saveToKv(key, value) {
      NProgress.start()
      const response = await fetch(`${localStorage.url}/kv`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${localStorage.bearer}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ key, value }),
      });
      NProgress.done()
      return await response.json();
    }

    async function loadFromKv(key) {
      NProgress.start()
      const response = await fetch(`${localStorage.url}/kv/${encodeURIComponent(key)}`, {
        headers: {
          "Authorization": `Bearer ${localStorage.bearer}`,
        },
      });
      NProgress.done()
      return (await response.json()).value;
    }

    async function callClaudeApi(prompt, system, chatName, model, images) {
      NProgress.start()
      const response = await fetch(`${localStorage.url}/claude`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${localStorage.bearer}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ prompt, system, chat_name: chatName, model, images }),
      })
      NProgress.done()
      return await response.json()
    }
  </script>
</body>

</html>
