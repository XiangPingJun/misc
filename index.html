<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.css">
  <script src="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.min.js"></script>
  <script src="./lib.js"></script>
  <style>
    main,
    header {
      padding: 0 !important;
      display: none;
    }

    fieldset label {
      display: inline;
      user-select: none;
      margin-right: var(--pico-spacing);
    }
  </style>
</head>

<body style="padding: var(--pico-spacing);">
  <header>
    <div role="group">
      <button onclick="sendPrompt()">↑<span id="activeName"></span></button>
      <button name="featureRadio" id="myNotesRadio" onclick="onFeatureSel(event)">✏️</button>
      <button name="featureRadio" id="aiNotesRadio" onclick="onFeatureSel(event)">🤖</button>
      <button name="featureRadio" id="promptRadio" onclick="onFeatureSel(event)">💬</button>
    </div>
  </header>

  <main id="credentials" class="container">
    <input id="urlInput" type="text" placeholder="URL">
    <input id="bearerInput" type="text" placeholder="Bearer">
    <button onclick="setCredentials()">Confirm</button>
  </main>

  <main id="chatNames">
    <template id="chatNameTemplate">
      <button></button>
    </template>
    <button onclick="add()">＋</button>
  </main>

  <main id="myNotes">
    <textarea rows="12"></textarea>
  </main>

  <main id="aiNotes">
    <article style="white-space: pre-line;"></article>
  </main>

  <main id="prompt">
    <textarea rows="4"></textarea>
    <div id="promptImages"></div>
    <article id="promptResult" style="white-space: pre-line;"></article>
  </main>

  <script>
    const MY_NOTES_INIT = "利用聊天技巧依照以下資料幫我產生三種簡單的回應訊息 關心對方 傾聽對方 別說會傷害對方的言詞:\n[他是怎樣的人?][怎麼認識他的?][他以前喜歡什麼?]\n"
    const MODELS = {
      chat: 'minimax/minimax-m2.7',
      summary: 'minimax/minimax-m2.7',
    }
    const CHAT_FIELDS = {
      myNotes: 'myNotes',
      messages: 'messages',
      messagesRevision: 'messagesRevision',
      summary: 'summary',
      summaryRevision: 'summaryRevision',
    }
    let promptImages = []
    const state = {
      aboutMe: '',
      chatMessages: [],
    }

    function sel(selector) {
      return document.querySelector(selector)
    }

    function selAll(selector) {
      return document.querySelectorAll(selector)
    }

    function activeChatName() {
      return sel('#activeName').textContent.trim()
    }

    function chatKey(name, field) {
      return `${name}_${field}`
    }

    function modelCacheKey(model) {
      return encodeToVariableName(model || 'default')
    }

    function chatModelKey(name, field, model) {
      return chatKey(name, `${field}_${modelCacheKey(model)}`)
    }

    function parseJson(value, fallback) {
      if (!value) {
        return fallback
      }

      try {
        return JSON.parse(value)
      } catch {
        return fallback
      }
    }

    function hideAllMains() {
      selAll('main').forEach(main => {
        main.style.display = 'none'
      })
    }

    function showMain(id) {
      hideAllMains()
      sel(`#${id}`).style.display = 'block'
    }

    function setHeaderVisible(visible) {
      sel('header').style.display = visible ? 'block' : 'none'
    }

    function formatChatName(meta) {
      const timestamp = Number(meta.time)
      if (!Number.isFinite(timestamp)) {
        return meta.name
      }

      const today = new Date()
      today.setHours(0, 0, 0, 0)

      const chatDate = new Date(timestamp)
      chatDate.setHours(0, 0, 0, 0)

      const dayDiff = Math.round((today.getTime() - chatDate.getTime()) / 86400000)
      return dayDiff > 4 ? `${meta.name}-${dayDiff}` : meta.name
    }

    function renderPromptImages() {
      const container = sel('#promptImages')
      container.innerHTML = ''

      promptImages.forEach((image, index) => {
        const wrapper = document.createElement('article')
        wrapper.style.display = 'inline-block'
        wrapper.style.marginRight = 'var(--pico-spacing)'
        wrapper.style.marginBottom = 'var(--pico-spacing)'

        const preview = document.createElement('img')
        preview.src = `data:${image.media_type};base64,${image.data}`
        preview.alt = `pasted-image-${index + 1}`
        preview.style.maxWidth = '160px'
        preview.style.maxHeight = '160px'
        preview.style.display = 'block'
        preview.style.marginBottom = '0.5rem'

        wrapper.appendChild(preview)
        container.appendChild(wrapper)
      })
    }

    function renderLatestExchange(messages) {
      const latest = messages.slice(-2).map(message => {
        const text = extractMessageText(message)
        return text ? `${message.role}: ${text}` : ''
      }).filter(Boolean)

      sel('#promptResult').textContent = latest.join('\n')
    }

    async function fileToBase64(file) {
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader()
        reader.onload = () => resolve(reader.result)
        reader.onerror = () => reject(reader.error)
        reader.readAsDataURL(file)
      })

      const [meta, base64] = dataUrl.split(',')
      const mediaType = meta.match(/data:(.*);base64/)[1]
      return { media_type: mediaType, data: base64 }
    }

    async function onPromptPaste(event) {
      const items = Array.from(event.clipboardData?.items || [])
      const imageItems = items.filter(item => item.type.startsWith('image/'))

      if (!imageItems.length) {
        return
      }

      event.preventDefault()

      for (const item of imageItems) {
        const file = item.getAsFile()
        if (!file) {
          continue
        }

        promptImages.push(await fileToBase64(file))
      }

      renderPromptImages()
    }

    async function loadChatMetas() {
      return parseJson(await loadFromKv('chatMetas'), [])
    }

    async function saveChatMetas(chatMetas) {
      await saveToKv('chatMetas', JSON.stringify(chatMetas))
    }

    async function add() {
      const input = prompt()
      if (!input) {
        return
      }

      const name = encodeToVariableName(input)
      const chatMetas = await loadChatMetas()
      chatMetas.push({ name, time: Date.now() })

      hideAllMains()
      await saveChatMetas(chatMetas)
      await Promise.all([
        saveToKv(chatKey(name, CHAT_FIELDS.myNotes), MY_NOTES_INIT),
        saveToKv(chatKey(name, CHAT_FIELDS.messages), '[]'),
        saveToKv(chatKey(name, CHAT_FIELDS.messagesRevision), '0'),
        saveToKv(chatKey(name, CHAT_FIELDS.summary), ''),
        saveToKv(chatKey(name, CHAT_FIELDS.summaryRevision), '-1'),
      ])

      localStorage.defaultName = name
      location.reload()
    }

    async function loadChatMessages(name) {
      return normalizeMessages(parseJson(await loadFromKv(chatKey(name, CHAT_FIELDS.messages)), []))
    }

    async function saveChatMessages(name, messages) {
      await saveToKv(chatKey(name, CHAT_FIELDS.messages), JSON.stringify(normalizeMessages(messages)))
    }

    async function loadNumberFromKv(key, fallback) {
      const value = Number(await loadFromKv(key))
      return Number.isFinite(value) ? value : fallback
    }

    async function loadChatRevision(name) {
      return loadNumberFromKv(chatKey(name, CHAT_FIELDS.messagesRevision), 0)
    }

    async function saveChatRevision(name, revision) {
      await saveToKv(chatKey(name, CHAT_FIELDS.messagesRevision), String(revision))
    }

    async function loadSummaryRevision(name, model) {
      return loadNumberFromKv(chatModelKey(name, CHAT_FIELDS.summaryRevision, model), -1)
    }

    async function saveSummary(name, model, summary, revision) {
      await Promise.all([
        saveToKv(chatModelKey(name, CHAT_FIELDS.summary, model), summary),
        saveToKv(chatModelKey(name, CHAT_FIELDS.summaryRevision, model), String(revision)),
      ])
    }

    function buildUserMessage(prompt, images) {
      const content = []

      if (prompt) {
        content.push({
          type: 'text',
          text: prompt,
        })
      }

      if (Array.isArray(images)) {
        images.forEach(image => {
          if (!image || typeof image.data !== 'string' || typeof image.media_type !== 'string') {
            return
          }

          content.push({
            type: 'image',
            source: {
              type: 'base64',
              media_type: image.media_type,
              data: image.data,
            },
          })
        })
      }

      return {
        role: 'user',
        content,
      }
    }

    function buildAssistantMessage(modelResult) {
      const rawContent = modelResult.raw?.choices?.[0]?.message?.content
      const content = Array.isArray(rawContent)
        ? rawContent.map(block => normalizeMessageBlock(block, 'assistant')).filter(Boolean)
        : []

      return {
        role: 'assistant',
        content: content.length ? content : [{ type: 'text', text: modelResult.content || '' }],
      }
    }

    function normalizeMessageBlock(block, role) {
      if (!block || typeof block !== 'object') {
        return null
      }

      if (block.type === 'text') {
        const text = typeof block.text === 'string'
          ? block.text
          : typeof block.text?.text === 'string'
            ? block.text.text
            : ''

        if (!text) {
          return null
        }

        return {
          type: 'text',
          text,
        }
      }

      if (role === 'user' && block.type === 'image' && block.source?.type === 'base64') {
        return {
          type: 'image',
          source: {
            type: 'base64',
            media_type: block.source.media_type,
            data: block.source.data,
          },
        }
      }

      return null
    }

    function normalizeMessages(messages) {
      if (!Array.isArray(messages)) {
        return []
      }

      return messages.map(message => {
        if (!message || (message.role !== 'user' && message.role !== 'assistant')) {
          return null
        }

        const content = Array.isArray(message.content)
          ? message.content.map(block => normalizeMessageBlock(block, message.role)).filter(Boolean)
          : []

        if (!content.length) {
          return null
        }

        return {
          role: message.role,
          content,
        }
      }).filter(Boolean)
    }

    function extractMessageText(message) {
      if (!Array.isArray(message?.content)) {
        return ''
      }

      return message.content
        .filter(block => block?.type === 'text' && typeof block.text === 'string')
        .map(block => block.text)
        .join('\n')
    }

    function formatChatMessagesForSummary(messages) {
      return messages.map(message => {
        const text = extractMessageText(message)
        return text ? `${message.role}:\n${text}` : ''
      }).filter(Boolean).join('\n\n')
    }

    async function summarizeChatMessages(name, revision) {
      const myNotes = await loadFromKv(chatKey(name, CHAT_FIELDS.myNotes))

      if (!state.chatMessages.length) {
        sel('#aiNotes article').textContent = ''
        await saveSummary(name, '', revision)
        return
      }

      const summaryResult = await callOpenRouterApi({
        prompt: [
          '請用繁體中文精簡整理以下對話重點。去除重複，輸出精簡條列摘要。',
          '',
          '我的筆記：',
          myNotes || '目前沒有 myNotes。',
          '',
          '對話訊息：',
          formatChatMessagesForSummary(state.chatMessages),
        ].join('\n'),
        model: MODELS.summary,
      })

      const summary = summaryResult.content || ''
      sel('#aiNotes article').textContent = summary
      await saveSummary(name, MODELS.summary, summary, revision)
    }

    async function ensureChatSummary(name) {
      const [messageRevision, summaryRevision, storedSummary] = await Promise.all([
        loadChatRevision(name),
        loadSummaryRevision(name, MODELS.summary),
        loadFromKv(chatModelKey(name, CHAT_FIELDS.summary, MODELS.summary)),
      ])

      if (summaryRevision === messageRevision && (storedSummary || !state.chatMessages.length)) {
        sel('#aiNotes article').textContent = storedSummary || ''
        return
      }

      await summarizeChatMessages(name, messageRevision)
    }

    async function refreshChatMetaTime(name) {
      const chatMetas = await loadChatMetas()
      const meta = chatMetas.find(item => item.name === name)
      if (!meta) {
        return
      }

      meta.time = Date.now()
      await saveChatMetas(chatMetas)
    }

    async function loadActiveChat(name) {
      const myNotes = await loadFromKv(chatKey(name, CHAT_FIELDS.myNotes))
      state.chatMessages = await loadChatMessages(name)

      activeName.textContent = name
      setHeaderVisible(true)

      const myNotesTextarea = sel('#myNotes textarea')
      myNotesTextarea.value = myNotes
      renderLatestExchange(state.chatMessages)

      activateFeature(myNotes === MY_NOTES_INIT ? 'myNotes' : 'prompt', false)
    }

    function createChatButton(meta) {
      const clone = sel('#chatNameTemplate').content.cloneNode(true)
      const btn = clone.querySelector('button')

      btn.dataset.chatName = meta.name
      btn.textContent = formatChatName(meta)
      btn.onclick = async () => {
        await loadActiveChat(meta.name)
      }

      if (meta.name === localStorage.defaultName) {
        btn.click()
        localStorage.removeItem('defaultName')
      }

      return clone
    }

    async function init() {
      if (!localStorage.url || !localStorage.bearer || location.search === '?reset') {
        setHeaderVisible(false)
        showMain('credentials')
        return
      }

      state.aboutMe = await loadFromKv('ABOUT_ME')
      const chatMetas = await loadChatMetas()
      const container = sel('#chatNames')

      chatMetas.sort((a, b) => a.time - b.time).forEach(meta => {
        container.appendChild(createChatButton(meta))
      })

      showMain('chatNames')
    }

    function clearPromptInput() {
      promptImages = []
      renderPromptImages()
      sel('#prompt textarea').value = ''
    }

    async function sendPrompt() {
      const textarea = sel('#prompt textarea')
      const prompt = textarea.value.trim()
      if (!prompt && !promptImages.length) {
        return
      }

      const name = activeChatName()
      const myNotes = await loadFromKv(chatKey(name, CHAT_FIELDS.myNotes))
      const nextMessages = [
        ...state.chatMessages,
        buildUserMessage(prompt, promptImages),
      ]

      const modelResult = await callOpenRouterApi({
        messages: nextMessages,
        system: `About me:${state.aboutMe}\n\n${myNotes}`,
        chatName: name,
        model: MODELS.chat,
      })

      const updatedMessages = [
        ...nextMessages,
        buildAssistantMessage(modelResult),
      ]

      sel('#promptResult').textContent = modelResult.content
      await saveChatMessages(name, updatedMessages)
      state.chatMessages = updatedMessages
      await saveChatRevision(name, (await loadChatRevision(name)) + 1)

      clearPromptInput()
      await refreshChatMetaTime(name)
    }

    function persistCurrentMyNotes() {
      const name = activeChatName()
      if (!name) {
        return
      }

      saveToKv(chatKey(name, CHAT_FIELDS.myNotes), sel('#myNotes textarea').value)
    }

    function setSelectedFeature(id) {
      selAll('[name=featureRadio]').forEach(btn => btn.classList.add('outline'))
      const button = sel(`#${id}Radio`)
      if (button) {
        button.classList.remove('outline')
      }
    }

    function activateFeature(id, persistMyNotes = true) {
      setSelectedFeature(id)
      showMain(id)

      const headerButton = sel('header button')
      headerButton.disabled = true

      if (id === 'myNotes') {
        sel('#myNotes textarea').focus()
        return
      }

      if (persistMyNotes) {
        persistCurrentMyNotes()
      }

      if (id === 'aiNotes') {
        ensureChatSummary(activeChatName())
        return
      }

      headerButton.disabled = false
      sel('#prompt textarea').focus()
    }

    function onFeatureSel(event) {
      activateFeature(event.target.id.replace('Radio', ''))
    }

    async function setCredentials() {
      localStorage.url = urlInput.value.trim()
      localStorage.bearer = bearerInput.value.trim().replace(/\/$/, '')
      const currentUrl = new URL(location.href)
      currentUrl.search = ''
      location.replace(currentUrl.toString())
    }

    async function saveToKv(key, value) {
      NProgress.start()
      const response = await fetch(`${localStorage.url}/kv`, {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${localStorage.bearer}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ key, value }),
      })
      NProgress.done()
      return await response.json()
    }

    async function loadFromKv(key) {
      NProgress.start()
      const response = await fetch(`${localStorage.url}/kv/${encodeURIComponent(key)}`, {
        headers: {
          Authorization: `Bearer ${localStorage.bearer}`,
        },
      })
      NProgress.done()

      if (response.status === 404) {
        await saveToKv(key, '')
        return ''
      }

      return (await response.json()).value
    }

    async function callOpenRouterApi({ messages, prompt, system, chatName, model, images }) {
      NProgress.start()
      const response = await fetch(`${localStorage.url}/openrouter`, {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${localStorage.bearer}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ messages, prompt, system, chat_name: chatName, model, images }),
      })
      NProgress.done()
      return await response.json()
    }

    sel('#prompt textarea').addEventListener('paste', onPromptPaste)
    renderPromptImages()
    init()
  </script>
</body>

</html>
